# EOL & Release Tracker - Tracked Applications
# ---------------------------------------------------
# name:             Application name
# github_repo:      GitHub repo in "owner/repo" format
# installed_version: Application's currently installed version, updated by sync_versions.py
# eol_name:         Product slug on endoflife.date (optional)
# tracked_cycle:    The major/minor cycle for EOL lookups
# version_check:    How to detect the installed version on this machine
#   method:         "command" | "file"
#   command:        Shell command that outputs the version string
#   path:           Path to a file containing the version (used if method: file)
#   regex:          Regex with a capture group to extract the version number

applications:

  - name: Element Web # Matches engine
    github_repo: element-hq/element-web 
    tracked_cycle: ""
    installed_version: "1.12.10"
    version_check:
      method: command
      command: "sudo ls /usr/share/jerboa/central/components/chat/initialize/resources/"
      regex: 'matrix-synapse-py3_([\d.]+)\+'

  - name: Logstash
    github_repo: elastic/logstash
    eol_name: logstash
    tracked_cycle: "8.19"
    installed_version: "None"
    version_check:
      method: file
      path: "/usr/share/logstash/version.rb"
      regex: "VERSION = \"([\\d.]+)\""
  
  - name: Mattermost # Matches engine 
    installed_version: "11.4.0"
    github_repo: mattermost/mattermost
    eol_name: mattermost
    tracked_cycle: "11.4"
    installed_version: "11.4.0"
    version_check:
      method: command
      command: "sudo ls /usr/share/jerboa/central/components/mattermost/initialize/resources/"
      regex: 'mattermost-team-([\d.]+)-linux'

  - name: NextCloud
    github_repo: nextcloud/server
    eol_name: nextcloud
    tracked_cycle: "33"
    installed_version: "None"
    version_check:
      method: file
      path: "/var/www/html/nextcloud/version.php"
      regex: '\$OC_VersionString\s*=\s*[''"]([^''"]+)[''"]'

  #- name: OpenLDAP
   # github_repo: OpenLDAP official releases are available on their main website or gitlab. I will have to add the functionality for this. 

  - name: OpenSearch
    github_repo: opensearch-project/OpenSearch
    eol_name: opensearch
    tracked_cycle: "3"
    installed_version: ""

  - name: Sensu # Matches engine
    github_repo: sensu/sensu-go
    tracked_cycle: ""
    eol_name: ""
    installed_version: ""
    version_check:
      method: command
      command: "sudo ls /usr/share/jerboa/central/components/sensu/initialize/resources/"
      regex: 'sensu-go-backend_([\d.]+)-'
    notes: ""

  - name: Standard Notes
    github_repo: standardnotes/app
    tracked_cycle: "3.2"
    installed_version: ""
    version_check:
      method:
      command:
      regex:
    notes: ""

  - name: TAK Server # Matches engine
    github_repo: TAK-Product-Center/Server
    tracked_cycle: ""
    eol_name: ""
    installed_version: ""
    version_check:
      method: command
      command: "sudo ls /usr/share/jerboa/central/components/tak/initialize/resources/"
      regex: 'takserver_([\d.]+-RELEASE[\d]+)'
    notes: ""

  - name: Traccar # Matches engine
    github_repo: traccar/traccar
    tracked_cycle: ""
    eol_name: ""
    installed_version: ""
    version_check:
      method: command
      command: "sudo ls /usr/share/jerboa/central/components/traccar/initialize/resources/"
      regex: 'traccar-linux-64-([\d.]+)\.zip'
    notes: ""

  - name: Wazuh
    github_repo: wazuh/wazuh
    tracked_cycle: ""
    eol_name: ""
    installed_version: ""
    version_check: 
      method:
      command:
      regex:
    notes: ""

  



# EOL & Release Tracker - Tracked Applications
# ---------------------------------------------------
# github_repo:      GitHub repo in "owner/repo" format
# eol_name:         Product slug on endoflife.date (optional)
# tracked_cycle:    The major/minor cycle for EOL lookups
# version_check:    How to detect the installed version on this machine
#   method:         "command" | "file"
#   command:        Shell command that outputs the version string
#   path:           Path to a file containing the version (used if method: file)
#   regex:          Regex with a capture group to extract the version number

applications:

  - name: Mattermost
    github_repo: mattermost/mattermost
    eol_name: mattermost
    tracked_cycle: "11.4"
    version_check:
      method: command
      command: "sudo -u mattermost /opt/mattermost/bin/mattermost version"
      regex: 'Version:\s*([\d.]+)'

  - name: Element Web
    github_repo: element-hq/element-web 
    tracked_cycle: ""
    version_check:
      method: file
      path: "/var/www/element-web/package.json"
      regex: '"version":\s*"([\d.]+)"'

  - name: Nextcloud
    github_repo: nextcloud/server
    eol_name: nextcloud
    tracked_cycle: "33"
    version_check:
      method: file
      path: "/var/www/html/nextcloud/version.php"
      regex: '\$OC_VersionString\s*=\s*[''"]([^''"]+)[''"]'

  - name: Logstash
    github_repo: elastic/logstash
    eol_name: logstash
    tracked_cycle: "9.3"
    version_check:
      method: file
      path: "/usr/share/logstash/version.rb"
      regex: "VERSION = \"([\\d.]+)\""

  - name: OpenSearch
    github_repo: opensearch-project/OpenSearch
    eol_name: opensearch
    tracked_cycle: "2"

